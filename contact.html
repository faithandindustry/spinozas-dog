<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact — Spinozas Dog</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500&display=swap">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Geist:wght@400;500&display=swap');
        body { font-family: 'Geist', system-ui, sans-serif; font-weight: 400; }
        .hero-bg { background-size: cover; background-position: center; background-attachment: fixed; min-height: 100vh; transition: background-image 1.8s ease-in-out; }
        .content { background: rgba(0, 0, 0, 0.65); backdrop-filter: blur(12px); }
        .page-title { font-size: 3rem; }
        .nav-link { transition: color 0.3s ease; }
        .nav-link:hover { color: #aaa; }
    </style>
</head>
<body class="bg-black text-white">

    <div id="slideshow" class="hero-bg fixed inset-0 z-0"></div>

    <div class="relative z-10 min-h-screen flex flex-col">
        <div class="flex-1 flex items-center justify-center px-6 py-20">
            <div class="content rounded-3xl max-w-2xl mx-auto p-12 text-center">
                <h1 class="page-title tracking-tighter mb-12">Contact</h1>
                
                <div class="space-y-8 text-xl">
                    <p>
                        <a href="mailto:hello@spinozas.dog" class="hover:underline">hello@spinozas.dog</a>
                    </p>
                    <p>
                        <a href="mailto:booking@spinozas.dog" class="hover:underline">booking@spinozas.dog</a>
                    </p>
                </div>

                <div class="mt-16 flex justify-center gap-x-8 text-lg">
                    <a href="#" class="hover:underline">Instagram</a>
                    <a href="#" class="hover:underline">Bandcamp</a>
                    <a href="#" class="hover:underline">Spotify</a>
                </div>
            </div>
        </div>

        <!-- Bottom Navigation -->
        <div class="py-10 flex justify-center gap-x-8 text-lg">
            <a href="index.html" class="nav-link">About</a>
            <a href="performances.html" class="nav-link">Performances</a>
            <a href="recordings.html" class="nav-link">Recordings</a>
            <a href="bookings.html" class="nav-link">Bookings</a>
            <a href="contact.html" class="nav-link">Contact</a>
        </div>
    </div>

    <script>
        // Background Slideshow
        const images = [
            "https://picsum.photos/id/1015/2000/1400",
            "https://picsum.photos/id/133/2000/1400",
            "https://picsum.photos/id/201/2000/1400",
            "https://picsum.photos/id/251/2000/1400",
            "https://picsum.photos/id/870/2000/1400"
        ];
        let current = 0;
        const slideshow = document.getElementById('slideshow');

        function changeBg() {
            slideshow.style.backgroundImage = `url('${images[current]}')`;
            current = (current + 1) % images.length;
        }
        setInterval(changeBg, 6500);
        changeBg();
    </script>
</body>
</html>
