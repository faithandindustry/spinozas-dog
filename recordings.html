<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recordings — Spinozas Dog</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500&display=swap">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Geist:wght@400;500&display=swap');
        body { font-family: 'Geist', system-ui, sans-serif; font-weight: 400; }
        .hero-bg { background-size: cover; background-position: center; background-attachment: fixed; min-height: 100vh; transition: background-image 2s ease-in-out; }
        .title { font-size: 3.2rem; letter-spacing: -0.04em; }
        .nav-link { font-size: 1.1rem; transition: color 0.3s ease; }
        .nav-link:hover { color: #ccc; }
    </style>
</head>
<body class="bg-black text-white">

    <div id="slideshow" class="hero-bg fixed inset-0 z-0"></div>

    <!-- Top Bar -->
    <div class="relative z-50 flex justify-between items-center px-8 md:px-12 py-8">
        <a href="index.html" class="title tracking-tighter">Spinozas Dog</a>
        <div class="flex gap-x-8 md:gap-x-10">
            <a href="index.html" class="nav-link">About</a>
            <a href="performances.html" class="nav-link">Performances</a>
            <a href="recordings.html" class="nav-link">Recordings</a>
            <a href="bookings.html" class="nav-link">Bookings</a>
            <a href="contact.html" class="nav-link">Contact</a>
        </div>
    </div>

    <div class="relative z-10 flex items-center justify-center min-h-[calc(100vh-120px)] px-6">
        <div class="max-w-xl">
            <h1 class="text-5xl tracking-tighter mb-12">Recordings</h1>
            
            <div class="space-y-12">
                <div>
                    <p class="text-2xl mb-1">Shuffle</p>
                    <p class="text-white/60">Demo • 2026</p>
                </div>

                <!-- Simple Player -->
                <div class="bg-black/70 border border-white/20 rounded-3xl p-8">
                    <button onclick="togglePlay()" id="playBtn"
                            class="w-16 h-16 mx-auto mb-6 rounded-full bg-white text-black text-4xl flex items-center justify-center hover:scale-105 transition">
                        ▶
                    </button>
                    <audio id="player" loop>
                        <source src="assets/track.mp3" type="audio/mpeg">
                    </audio>
                    <p class="text-center text-sm">Shuffle</p>
                </div>

                <p class="text-white/70 text-center">We multitrack all our rehearsals and improvisations and are curretnly collating material towards a debut.</p>
            </div>
        </div>
    </div>

	<script>
    const images = [
        "assets/spinozas-dog-test-1.jpg",
        "assets/spinozas-dog-test-10.jpg",
        "assets/spinozas-dog-test-11.jpg",
        "assets/spinozas-dog-test-3.jpg",
        "assets/spinozas-dog-test-5.jpg",
        "assets/spinozas-dog-test-6.jpg",
        "assets/spinozas-dog-test-7.jpg",
        "assets/spinozas-dog-test-9.jpg"
    ];

    let current = 0;
        const slideshow = document.getElementById('slideshow');
        function changeBg() {
            slideshow.style.backgroundImage = `url('${images[current]}')`;
            current = (current + 1) % images.length;
        }
        setInterval(changeBg, 7000); changeBg();

        // Player
        const audio = document.getElementById('player');
        function togglePlay() {
            if (audio.paused) {
                audio.play();
                document.getElementById('playBtn').textContent = '❚❚';
            } else {
                audio.pause();
                document.getElementById('playBtn').textContent = '▶';
            }
        }
    </script>
</body>
</html>
