<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spinozas Dog</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500&display=swap">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Geist:wght@400;500&display=swap');
        
        body {
            font-family: 'Geist', system-ui, sans-serif;
            font-weight: 400;
        }
        
        .hero-bg {
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            transition: background-image 2s ease-in-out;
            min-height: 100vh;
        }
        
        .main-content {
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(8px);
        }
    </style>
</head>
<body class="bg-black text-white overflow-hidden">

    <!-- Background Slideshow -->
    <div id="slideshow" class="hero-bg fixed inset-0 z-0"></div>

    <div class="relative z-10 min-h-screen flex flex-col justify-between">
        
        <!-- Main Centered Content -->
        <div class="flex-1 flex items-center justify-center px-6 py-20">
            <div class="main-content rounded-3xl max-w-xl mx-auto p-16 text-center">
                <h1 class="text-7xl md:text-8xl tracking-tighter mb-8">Spinozas Dog</h1>
                
                <p class="text-2xl text-white/70 mb-10">
                    experimental rock • psychedelic folk • noise
                </p>
                
                <div class="max-w-md mx-auto text-lg leading-relaxed text-white/80">
                    <p>Music born somewhere between philosophy and raw instinct.</p>
                </div>

                <!-- Subtle Audio Player -->
                <div class="mt-16 flex justify-center">
                    <div class="flex items-center gap-5 bg-black/60 border border-white/20 rounded-2xl px-7 py-4">
                        <button id="playBtn" 
                                class="w-12 h-12 flex items-center justify-center text-3xl hover:scale-110 transition">
                            ▶
                        </button>
                        <div class="text-left">
                            <p class="text-sm">Howling at Eternity</p>
                            <p class="text-xs text-white/50">2025</p>
                        </div>
                        <audio id="player" loop>
                            <source src="assets/track.mp3" type="audio/mpeg">
                        </audio>
                        <button id="muteBtn" class="text-sm text-white/60 hover:text-white">mute</button>
                    </div>
                </div>
            </div>
        </div>

        <!-- Bottom Navigation -->
        <div class="pb-12 flex justify-center gap-x-10 text-lg">
            <a href="index.html" class="hover:text-white/60 transition">About</a>
            <a href="performances.html" class="hover:text-white/60 transition">Performances</a>
            <a href="recordings.html" class="hover:text-white/60 transition">Recordings</a>
            <a href="bookings.html" class="hover:text-white/60 transition">Bookings</a>
            <a href="contact.html" class="hover:text-white/60 transition">Contact</a>
        </div>
    </div>

    <script>
        // Background Slideshow (same as before)
        const images = [
            "https://picsum.photos/id/1015/2000/1400",
            "https://picsum.photos/id/133/2000/1400",
            "https://picsum.photos/id/201/2000/1400",
            "https://picsum.photos/id/251/2000/1400",
            "https://picsum.photos/id/870/2000/1400"
        ];
        let current = 0;
        const slideshow = document.getElementById('slideshow');

        function changeBg() {
            slideshow.style.backgroundImage = `url('${images[current]}')`;
            current = (current + 1) % images.length;
        }
        setInterval(changeBg, 7000);
        changeBg();

        // Audio Player
        const audio = document.getElementById('player');
        const playBtn = document.getElementById('playBtn');
        const muteBtn = document.getElementById('muteBtn');
        let isMuted = false;

        playBtn.addEventListener('click', () => {
            if (audio.paused) {
                audio.play();
                playBtn.textContent = '❚❚';
            } else {
                audio.pause();
                playBtn.textContent = '▶';
            }
        });

        muteBtn.addEventListener('click', () => {
            isMuted = !isMuted;
            audio.muted = isMuted;
            muteBtn.textContent = isMuted ? 'unmute' : 'mute';
        });
    </script>
</body>
</html>
