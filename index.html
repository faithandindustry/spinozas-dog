<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spinozas Dog</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500&display=swap">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Geist:wght@400;500&display=swap');
        body { font-family: 'Geist', system-ui, sans-serif; font-weight: 400; }
        
        .hero-bg {
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            transition: background-image 1.8s ease-in-out;
            min-height: 100vh;
        }
        
        .content { background: rgba(0, 0, 0, 0.65); backdrop-filter: blur(12px); }
        
        .title { font-size: 5.5rem; line-height: 1.05; }
        .page-title { font-size: 3rem; }
        
        .nav-link { transition: color 0.3s ease; }
        .nav-link:hover { color: #aaa; }
    </style>
</head>
<body class="bg-black text-white">

    <!-- Background Slideshow -->
    <div id="slideshow" class="hero-bg fixed inset-0 z-0"></div>

    <div class="relative z-10 min-h-screen flex flex-col">
        
        <!-- Main Content -->
        <div class="flex-1 flex items-center justify-center px-6">
            <div class="content rounded-3xl max-w-2xl mx-auto p-12 text-center">
                <h1 class="title tracking-tighter mb-6">Spinozas Dog</h1>
                <p class="text-2xl text-white/70 mb-10">experimental rock • psychedelic folk • noise</p>
                
                <div class="text-lg leading-relaxed text-white/80 max-w-md mx-auto">
                    <p class="mb-6">Music born from philosophy and instinct.</p>
                    <p>We blend jagged guitars, tender melodies, and noise into something untamed.</p>
                </div>

                <!-- Audio Player -->
                <div class="mt-16">
                    <div class="inline-flex items-center gap-4 bg-black/70 border border-white/20 rounded-2xl px-6 py-4">
                        <button id="playBtn" class="w-11 h-11 rounded-full bg-white text-black flex items-center justify-center text-2xl hover:scale-105 transition">▶</button>
                        <div class="text-left">
                            <p class="text-sm">Howling at Eternity</p>
                            <p class="text-xs text-white/50">2025</p>
                        </div>
                        <audio id="player" loop>
                            <source src="assets/track.mp3" type="audio/mpeg">
                        </audio>
                        <button id="muteBtn" class="text-white/60 hover:text-white text-sm">mute</button>
                    </div>
                </div>
            </div>
        </div>

        <!-- Bottom Navigation -->
        <div class="py-10 flex justify-center gap-x-8 text-lg">
            <a href="index.html" class="nav-link">About</a>
            <a href="performances.html" class="nav-link">Performances</a>
            <a href="recordings.html" class="nav-link">Recordings</a>
            <a href="bookings.html" class="nav-link">Bookings</a>
            <a href="contact.html" class="nav-link">Contact</a>
        </div>
    </div>

    <script>
        // Background Slideshow
        const images = [
            "https://picsum.photos/id/1015/2000/1400",
            "https://picsum.photos/id/133/2000/1400",
            "https://picsum.photos/id/201/2000/1400",
            "https://picsum.photos/id/251/2000/1400",
            "https://picsum.photos/id/870/2000/1400"
        ];
        let current = 0;
        const slideshow = document.getElementById('slideshow');

        function changeBg() {
            slideshow.style.backgroundImage = `url('${images[current]}')`;
            current = (current + 1) % images.length;
        }
        setInterval(changeBg, 6500);
        changeBg();

        // Audio Player
        const audio = document.getElementById('player');
        const playBtn = document.getElementById('playBtn');
        const muteBtn = document.getElementById('muteBtn');
        let muted = false;

        playBtn.addEventListener('click', () => {
            if (audio.paused) {
                audio.play();
                playBtn.textContent = '❚❚';
            } else {
                audio.pause();
                playBtn.textContent = '▶';
            }
        });

        muteBtn.addEventListener('click', () => {
            muted = !muted;
            audio.muted = muted;
            muteBtn.textContent = muted ? 'unmute' : 'mute';
        });
    </script>
</body>
</html>
